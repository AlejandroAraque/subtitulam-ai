# ─────────────────────────────────────────────────────────────────────────────
# Subtitulam — stack production-grade en 3 contenedores.
#
#   qdrant    : vector store standalone (puerto 6333 HTTP, 6334 gRPC)
#   backend   : FastAPI + uvicorn (puerto 8000)
#   frontend  : Streamlit (puerto 8501)
#
# Levantar:
#   1. cp .env.example .env   y rellena OPENAI_API_KEY
#   2. docker compose up -d
#   3. abre http://localhost:8501
#
# Persistencia:
#   - qdrant_storage : vectores indexados (volumen Docker nombrado)
#   - app_data       : SQLite (jobs, glossary, translations) + outputs
# ─────────────────────────────────────────────────────────────────────────────

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: subtitulam-qdrant
    # Bind solo a loopback: el backend llega vía red interna de compose;
    # publicar en 0.0.0.0 dejaba la API de escritura (sin auth) y el
    # dashboard accesibles desde toda la LAN.
    ports:
      - "127.0.0.1:6333:6333"   # HTTP REST + dashboard (http://localhost:6333/dashboard)
      - "127.0.0.1:6334:6334"   # gRPC (más rápido para batches grandes)
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: subtitulam-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # :? hace fallar `docker compose up` si la var no está definida,
      # en vez de arrancar con clave vacía y fallar en el primer job.
      OPENAI_API_KEY: ${OPENAI_API_KEY:?Define OPENAI_API_KEY en .env}
      QDRANT_URL:     http://qdrant:6333
      DATABASE_URL:   sqlite:////app/data/subtitulam.db
    volumes:
      - app_data:/app/data
      # Modelos EasyOCR (~150 MB): sin volumen se re-descargan en cada
      # recreación del contenedor.
      - easyocr_models:/root/.EasyOCR
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: subtitulam-frontend
    ports:
      - "8501:8501"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_storage:
  app_data:
  easyocr_models:
